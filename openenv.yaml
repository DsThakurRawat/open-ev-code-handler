version: "1.0"
name: "agentorg-codereview"
description: "AI Senior Code Reviewer evaluation environment for AgentOrg."
entry_point: "app:app"

tasks:
  - id: "bug_detection"
    max_steps: 10
    scenarios: 10
  - id: "security_audit"
    max_steps: 15
    scenarios: 10
  - id: "architectural_review"
    max_steps: 20
    scenarios: 10

grading:
  type: "deterministic"
  issue_matching:
    coverage_weight: 0.4
    precision_weight: 0.6
  quality_scoring:
    severity_weight: 0.7
    keyword_weight: 0.3

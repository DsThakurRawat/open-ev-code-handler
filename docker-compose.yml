version: "3.9"

services:
  api:
    build:
      context: .
      target: production
    container_name: codelens-api
    ports:
      - "${APP_PORT:-7860}:7860"
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - codelens-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  codelens-data:
    driver: local
